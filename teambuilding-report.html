<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>팀 리포트 — 온유스쿨 쉐도우그램</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --navy:#1A3055;--teal:#256060;--gold:#8A6400;
  --bg:#F5F3EE;--white:#FFF;--gray:#333;--mid:#666;--light:#999;
  --border:#DDD;--green:#8FC49A;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;
  font-size:15px;line-height:1.7;background:var(--bg);color:var(--gray)}
.topbar{background:var(--navy);padding:13px 24px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50}
.topbar-logo{color:#fff;font-size:.9rem;font-weight:800;letter-spacing:.04em;text-decoration:none}
.topbar-logo span{color:var(--green)}
.btn-print{background:var(--green);color:var(--navy);padding:8px 16px;border-radius:6px;
  border:none;font-size:.8rem;font-weight:700;cursor:pointer;font-family:inherit}
.btn-pdf{background:#C05000;color:#fff;padding:8px 16px;border-radius:6px;
  border:none;font-size:.8rem;font-weight:700;cursor:pointer;font-family:inherit;margin-left:8px}
.btn-pdf:disabled{opacity:.6;cursor:not-allowed}
.container{max-width:900px;margin:0 auto;padding:24px 20px}
.sec{padding:36px 0;border-bottom:2px solid var(--border)}
.sec:last-child{border-bottom:none}
.sec h2{font-size:1.4rem;font-weight:800;color:var(--navy);margin-bottom:18px;
  padding-bottom:10px;border-bottom:2px solid var(--teal)}
.sec h3{font-size:1rem;font-weight:800;color:var(--navy);margin:16px 0 10px}
.card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
/* 커버 */
.cover{background:linear-gradient(135deg,var(--navy) 0%,var(--teal) 100%);
  border-radius:16px;padding:36px 28px;color:#fff;margin-bottom:28px;text-align:center}
.cover-brand{font-size:.75rem;font-weight:800;letter-spacing:.15em;color:rgba(255,255,255,.55);margin-bottom:12px}
.cover-church{font-size:1.8rem;font-weight:900;margin-bottom:6px}
.cover-title{font-size:1rem;color:rgba(255,255,255,.75);margin-bottom:20px}
.cover-stats{display:flex;justify-content:center;gap:24px;flex-wrap:wrap}
.cover-stat{text-align:center}
.cover-stat .num{font-size:1.8rem;font-weight:900;color:var(--green)}
.cover-stat .lbl{font-size:.75rem;color:rgba(255,255,255,.65)}
/* 유형 분포 */
.type-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px}
.type-card{background:#fff;border:1.5px solid var(--border);border-radius:10px;
  padding:14px 10px;text-align:center}
.tc-icon{font-size:1.8rem;margin-bottom:6px}
.tc-type{font-size:.78rem;font-weight:800;color:var(--teal)}
.tc-kr{font-size:.88rem;font-weight:700;color:var(--navy);margin-bottom:4px}
.tc-count{font-size:1.2rem;font-weight:900;color:var(--gold)}
.tc-bar{height:5px;background:#EEE;border-radius:3px;margin-top:8px;overflow:hidden}
.tc-bar-fill{height:100%;background:var(--teal);border-radius:3px}
/* AI 서술 박스 */
.ai-box{background:linear-gradient(135deg,#1A3055,#256060);border-radius:12px;
  padding:20px 22px;color:#fff;margin-bottom:14px}
.ai-box .ai-lbl{font-size:.72rem;color:rgba(255,255,255,.5);font-weight:700;
  letter-spacing:.1em;margin-bottom:8px}
.ai-box p{font-size:.9rem;line-height:1.85;font-style:italic;color:rgba(255,255,255,.9)}
.ai-shadow-box{background:linear-gradient(135deg,#3A1060,#5A2090)}
/* 강점·취약 */
.strength-list,.vuln-list{list-style:none;padding:0}
.strength-list li,.vuln-list li{padding:9px 0;border-bottom:1px solid #F0EDE8;
  font-size:.9rem;line-height:1.7;display:flex;gap:10px}
.strength-list li:last-child,.vuln-list li:last-child{border-bottom:none}
.strength-list li::before{content:'✦';color:var(--teal);flex-shrink:0;margin-top:2px}
.vuln-list li::before{content:'△';color:var(--gold);flex-shrink:0;margin-top:2px}
/* 동역 구조 */
.cowork-table{width:100%;border-collapse:collapse}
.cowork-table th{background:var(--navy);color:#fff;padding:10px 14px;
  font-size:.82rem;text-align:left}
.cowork-table td{padding:10px 14px;border-bottom:1px solid var(--border);
  font-size:.85rem;vertical-align:top;line-height:1.65}
.cowork-table tr:last-child td{border-bottom:none}
/* 팀원 목록 */
.member-row{display:flex;align-items:center;gap:14px;padding:12px 0;
  border-bottom:1px solid #F0EDE8}
.member-row:last-child{border-bottom:none}
.mr-icon{font-size:1.6rem;width:40px;text-align:center;flex-shrink:0}
.mr-info{flex:1}
.mr-name{font-size:.92rem;font-weight:700;color:var(--navy)}
.mr-meta{font-size:.78rem;color:var(--mid)}
.mr-type{font-size:.8rem;font-weight:800;color:var(--teal)}
/* 워크숍 섹션 */
.ws-step{background:#fff;border:1px solid var(--border);border-radius:12px;
  margin-bottom:16px;overflow:hidden}
.ws-header{display:flex;align-items:center;gap:14px;padding:16px 18px;
  background:linear-gradient(90deg,rgba(26,48,85,.04),transparent)}
.ws-num{background:var(--gold);color:#fff;width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:.85rem;
  font-weight:800;flex-shrink:0}
.ws-header-info{flex:1}
.ws-title{font-size:.95rem;font-weight:800;color:var(--navy);margin-bottom:2px}
.ws-time{font-size:.75rem;color:var(--gold);font-weight:700}
.ws-body{padding:0 18px 16px}
.ws-purpose{font-size:.82rem;color:var(--mid);line-height:1.7;margin-bottom:10px;
  padding:8px 12px;background:#F8F6F0;border-radius:6px}
.ws-script-wrap{margin-bottom:10px}
.ws-script-label{font-size:.73rem;font-weight:800;color:var(--teal);letter-spacing:.06em;
  margin-bottom:5px}
.ws-script{background:rgba(37,96,96,.06);border-left:3px solid var(--teal);
  border-radius:0 8px 8px 0;padding:12px 14px;font-size:.85rem;
  font-style:italic;color:#1A4A4A;line-height:1.85}
.ws-activity-wrap{margin-bottom:8px}
.ws-activity-label{font-size:.73rem;font-weight:800;color:var(--gold);letter-spacing:.06em;
  margin-bottom:5px}
.ws-activity{background:#FFF8E6;border:1px solid #F0D890;border-radius:8px;
  padding:12px 14px;font-size:.85rem;line-height:1.75}
.ws-activity strong{color:var(--gold)}
.ws-tips{margin-top:8px}
.ws-tips-label{font-size:.73rem;font-weight:800;color:#8B1A1A;letter-spacing:.06em;margin-bottom:5px}
.ws-tips ul{list-style:none;padding:0}
.ws-tips ul li{font-size:.82rem;color:#6B1A1A;line-height:1.7;padding:3px 0;
  padding-left:14px;position:relative}
.ws-tips ul li::before{content:'⚠';position:absolute;left:0;font-size:.72rem}
.ws-checklist{background:#F0F7F4;border:1px solid rgba(37,96,96,.2);border-radius:8px;
  padding:12px 14px;margin-top:8px}
.ws-checklist-label{font-size:.73rem;font-weight:800;color:var(--teal);letter-spacing:.06em;margin-bottom:6px}
.ws-checklist ul{list-style:none;padding:0}
.ws-checklist ul li{font-size:.82rem;color:var(--gray);line-height:1.7;padding:2px 0;
  padding-left:20px;position:relative}
.ws-checklist ul li::before{content:'☐';position:absolute;left:0;color:var(--teal)}
.tag{display:inline-block;background:rgba(37,96,96,.1);color:var(--teal);
  font-size:.72rem;font-weight:700;padding:3px 8px;border-radius:4px;margin:2px}
.loading-wrap{text-align:center;padding:80px 20px;color:var(--mid)}
.spin{font-size:2.5rem;animation:spin 1.2s linear infinite;display:inline-block;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
@media print{
  /* 기본 */
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  .topbar,.btn-print,.btn-pdf{display:none!important}
  body{background:#fff!important;margin:0!important;padding:0!important;font-size:13px!important}
  .container{padding:4px 10px!important;max-width:100%!important}

  /* 섹션 — 페이지 경계에서 잘리지 않게 */
  .sec{page-break-inside:avoid;break-inside:avoid;padding:16px 0!important;border-bottom:1px solid #DDD!important}
  .sec h2{font-size:1.1rem!important;margin-bottom:10px!important;padding-bottom:6px!important}

  /* 카드·박스 — 중첩/잘림 방지 */
  .card,.ai-box,.ai-shadow-box,.ws-step,.ws-body,
  .ws-script,.ws-activity,.ws-checklist,.ws-purpose{
    page-break-inside:avoid!important;
    break-inside:avoid!important;
    overflow:visible!important;
  }

  /* 커버 — 첫 페이지 전용 */
  .cover{
    page-break-after:avoid!important;
    break-after:avoid!important;
    padding:20px!important;
    margin-bottom:12px!important;
  }

  /* 유형 카드 그리드 — 행 단위로 묶음 */
  .type-grid{
    grid-template-columns:repeat(4,1fr)!important;
    gap:8px!important;
    page-break-inside:avoid!important;
    break-inside:avoid!important;
  }
  .type-card{
    page-break-inside:avoid!important;
    break-inside:avoid!important;
    padding:10px 8px!important;
  }

  /* 팀원 행 */
  .member-row{
    page-break-inside:avoid!important;
    break-inside:avoid!important;
  }

  /* 동역 테이블 */
  .cowork-table tr{
    page-break-inside:avoid!important;
    break-inside:avoid!important;
  }

  /* 워크숍 스텝 — 각 스텝은 가능하면 한 페이지에 */
  .ws-step{
    page-break-inside:avoid!important;
    break-inside:avoid!important;
    margin-bottom:10px!important;
  }
  .ws-header{padding:10px 14px!important}
  .ws-body{padding:0 14px 10px!important}

  /* AI 서술 박스 크기 줄임 */
  .ai-box{padding:14px 16px!important;margin-bottom:10px!important}
  .ai-box p{font-size:.82rem!important;line-height:1.7!important}

  /* 강점·취약 리스트 */
  .strength-list li,.vuln-list li{
    page-break-inside:avoid!important;
    break-inside:avoid!important;
    font-size:.82rem!important;
    padding:6px 0!important;
  }

  /* 태그 */
  .tag{font-size:.68rem!important;padding:2px 6px!important}

  /* 설문 — 인쇄 시 숨김 */
  .survey-section{display:none!important}
}

/* ── 설문지 ── */
.survey-section{background:linear-gradient(180deg,#F0F7F4 0%,var(--bg) 100%);
  border-top:3px solid var(--teal);border-radius:14px;padding:28px 22px;margin-top:24px}
.survey-title{font-size:1.1rem;font-weight:800;color:var(--navy);margin-bottom:4px}
.survey-sub{font-size:.82rem;color:var(--mid);margin-bottom:20px;line-height:1.7}
.survey-q{margin-bottom:18px}
.survey-q-label{font-size:.88rem;font-weight:700;color:var(--navy);margin-bottom:8px;line-height:1.5}
.survey-q-label .q-num{display:inline-block;background:var(--teal);color:#fff;width:22px;height:22px;
  border-radius:50%;text-align:center;line-height:22px;font-size:.72rem;font-weight:800;margin-right:6px}
.survey-radio-group{display:flex;flex-wrap:wrap;gap:6px}
.survey-radio{display:none}
.survey-radio-label{padding:8px 14px;border:1.5px solid var(--border);border-radius:8px;
  font-size:.82rem;cursor:pointer;transition:all .15s;color:var(--mid);background:#fff;font-weight:600}
.survey-radio:checked + .survey-radio-label{border-color:var(--teal);background:#E8F4F0;color:var(--teal)}
.survey-textarea{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:8px;
  font-size:.88rem;font-family:inherit;outline:none;resize:vertical;min-height:60px;
  transition:border-color .15s;color:var(--gray)}
.survey-textarea:focus{border-color:var(--teal)}
.survey-price-group{display:flex;flex-wrap:wrap;gap:6px}
.survey-submit{width:100%;padding:14px;background:var(--teal);color:#fff;border:none;
  border-radius:10px;font-size:.95rem;font-weight:800;cursor:pointer;font-family:inherit;
  transition:background .2s;margin-top:8px}
.survey-submit:hover{background:#1A4848}
.survey-submit:disabled{background:var(--border);color:var(--light);cursor:default}
.survey-done{text-align:center;padding:24px;color:var(--teal);font-size:.95rem;font-weight:700}
</style>
</head>

async function init() {
  if (!CODE) {
    document.getElementById('loading-wrap').innerHTML =
      '<div style="color:var(--mid)">코드가 없습니다. 올바른 링크인지 확인하세요.</div>';
    return;
  }

  try {
    // sessionStorage 캐시 먼저 확인
    let data = null;
    const cached = sessionStorage.getItem('tb_report_data_' + CODE);
    if (cached) {
      try { data = JSON.parse(cached); } catch(e){}
    }

    if (!data) {
      // Edge Function 호출 (DB 캐시 or 새 생성)
      const res = await fetch(EDGE_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY },
        body: JSON.stringify({ code: CODE, mode: 'all' }),
      });
      if (!res.ok) { const e = await res.json(); throw new Error(e.error || '서버 오류'); }
      data = await res.json();
      sessionStorage.setItem('tb_report_data_' + CODE, JSON.stringify(data));
    }

    renderReport(data);
  } catch(e) {
    document.getElementById('loading-wrap').innerHTML =
      `<div style="color:#C00;font-size:.9rem">❌ 오류: ${e.message}</div>`;
  }
}

async function submitSurvey(e) {
  e.preventDefault();
  const btn = document.getElementById('survey-submit-btn');
  btn.disabled = true;
  btn.textContent = '제출 중...';

  const form = document.getElementById('survey-form');
  const fd = new FormData(form);

  const payload = {
    workshop_code: CODE,
    church_name: CHURCH || null,
    q1_usefulness: parseInt(fd.get('q1_usefulness')) || null,
    q2_accuracy: parseInt(fd.get('q2_accuracy')) || null,
    q3_interest: fd.get('q3_interest') || null,
    q4_price_individual: fd.get('q4_price_individual')?.trim() || null,
    q4_price_couple: fd.get('q4_price_couple')?.trim() || null,
    q4_price_parenting: fd.get('q4_price_parenting')?.trim() || null,
    q4_price_team: fd.get('q4_price_team')?.trim() || null,
    q6_feedback: fd.get('q6_feedback')?.trim() || null,
    submitted_at: new Date().toISOString(),
  };

  try {
    const res = await fetch(`${SB_URL}/rest/v1/survey_feedback`, {
      method: 'POST',
      headers: {
        apikey: SB_KEY,
        Authorization: 'Bearer ' + SB_KEY,
        'Content-Type': 'application/json',
        Prefer: 'return=minimal',
      },
      body: JSON.stringify(payload),
    });
    if (!res.ok) throw new Error(await res.text());

    form.style.display = 'none';
    document.getElementById('survey-done').style.display = 'block';
  } catch(err) {
    console.error('Survey submit error:', err);
    alert('설문 제출 중 오류가 발생했습니다. 다시 시도해 주세요.');
    btn.disabled = false;
    btn.textContent = '설문 제출하기';
  }
}

async function downloadPDF() {
  const btn = document.getElementById('btn-pdf');
  if (!btn) return;
  btn.disabled = true;
  btn.textContent = '⏳ 생성 중...';

  const church = CHURCH || CODE || '팀리포트';
  const filename = `쉐도우그램_팀리포트_${church}.pdf`;

  try {
    const { jsPDF } = window.jspdf;

    // A4: 210 x 297mm, 여백 10mm
    const pdf = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });
    const PAGE_W = 210;
    const PAGE_H = 297;
    const MARGIN = 10;
    const CONTENT_W = PAGE_W - MARGIN * 2;   // 190mm
    const CONTENT_H = PAGE_H - MARGIN * 2;   // 277mm
    const SCALE = 2;

    // ── 캡처용 wrapper 생성 (190mm = 약 719px @96dpi) ──
    const PX_PER_MM = 96 / 25.4;
    const captureW = Math.round(CONTENT_W * PX_PER_MM); // ~719px

    const source = document.getElementById('report-wrap');
    if (!source) throw new Error('report-wrap 없음');

    // ── wrapper: position:absolute (fixed는 뷰포트 높이로 잘림) ──
    const wrapper = document.createElement('div');
    wrapper.style.cssText = [
      'position:absolute',
      'top:0', 'left:-9999px',   // 화면 밖 배치 (보이지 않게)
      `width:${captureW}px`,
      'background:#F5F3EE',
      'pointer-events:none',
      'font-family:Apple SD Gothic Neo,Noto Sans KR,Malgun Gothic,sans-serif',
      'font-size:14px', 'line-height:1.7', 'color:#333',
      'overflow:visible', 'padding:12px',
    ].join(';');

    // source 내용을 직접 innerHTML 복사 (cloneNode는 스타일 미반영 가능)
    wrapper.innerHTML = source.innerHTML;
    document.body.appendChild(wrapper);

    // 레이아웃·폰트 완전 렌더링 대기
    await new Promise(r => setTimeout(r, 500));

    // ── 섹션별 캔버스 캡처 → 페이지 경계 직접 계산 ──
    const blocks = Array.from(wrapper.querySelectorAll('.cover, .sec'));
    if (blocks.length === 0) throw new Error('렌더링된 섹션이 없습니다. 잠시 후 다시 시도하세요.');

    const canvasOpt = {
      scale: SCALE,
      useCORS: true,
      logging: false,
      scrollX: 0,
      scrollY: 0,
      windowWidth: captureW,
      backgroundColor: '#F5F3EE',
      allowTaint: true,
    };

    let curY = MARGIN;

    for (let i = 0; i < blocks.length; i++) {
      btn.textContent = `⏳ ${Math.round((i / blocks.length) * 85 + 10)}%`;

      const canvas = await html2canvas(blocks[i], canvasOpt);
      const imgData = canvas.toDataURL('image/jpeg', 0.93);

      // px → mm 변환 (SCALE 배 찍었으므로 나눠줌)
      const blockH_mm = (canvas.height / SCALE) / PX_PER_MM;
      const blockW_mm = CONTENT_W;

      if (blockH_mm <= 0) continue; // 빈 섹션 skip

      // 현재 페이지에 안 들어가면 새 페이지
      if (curY + blockH_mm > PAGE_H - MARGIN && curY > MARGIN + 5) {
        pdf.addPage();
        curY = MARGIN;
      }

      if (blockH_mm > CONTENT_H) {
        // 한 페이지보다 큰 블록 → 여러 페이지에 나눠서 출력 (축소 금지)
        const pageH_px = Math.round(CONTENT_H * PX_PER_MM * SCALE);
        const firstSliceH_px = Math.round((PAGE_H - MARGIN - curY) * PX_PER_MM * SCALE);
        let srcY = 0;
        let remainH_px = canvas.height;
        let firstPage = true;

        while (remainH_px > 0) {
          const sliceH_px = firstPage
            ? Math.min(firstSliceH_px, remainH_px)
            : Math.min(pageH_px, remainH_px);

          // 슬라이스 캔버스 생성
          const sliceCanvas = document.createElement('canvas');
          sliceCanvas.width  = canvas.width;
          sliceCanvas.height = sliceH_px;
          const ctx = sliceCanvas.getContext('2d');
          ctx.drawImage(canvas, 0, srcY, canvas.width, sliceH_px, 0, 0, canvas.width, sliceH_px);

          const sliceImg = sliceCanvas.toDataURL('image/jpeg', 0.93);
          const sliceH_mm = (sliceH_px / SCALE) / PX_PER_MM;

          pdf.addImage(sliceImg, 'JPEG', MARGIN, curY, blockW_mm, sliceH_mm, '', 'FAST');

          srcY       += sliceH_px;
          remainH_px -= sliceH_px;
          firstPage   = false;

          if (remainH_px > 0) {
            pdf.addPage();
            curY = MARGIN;
          } else {
            curY += sliceH_mm + 3;
          }
        }
      } else {
        pdf.addImage(imgData, 'JPEG', MARGIN, curY, blockW_mm, blockH_mm, '', 'FAST');
        curY += blockH_mm + 3;
      }
    }

    document.body.removeChild(wrapper);
    btn.textContent = '⏳ 저장 중...';
    pdf.save(filename);
    btn.disabled = false;
    btn.textContent = '📄 PDF 저장';

  } catch(e) {
    const w = document.getElementById('__pdf-capture__') || document.querySelector('[style*="z-index:-9999"]');
    if (w) document.body.removeChild(w);
    console.error('PDF error:', e);
    btn.disabled = false;
    btn.textContent = '📄 PDF 저장';
    alert('PDF 생성 오류: ' + e.message + '\n인쇄 버튼을 이용해주세요.');
  }
}

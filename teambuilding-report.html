<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>팀 리포트 — 온유스쿨 쉐도우그램</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
:root{
  --navy:#1A3055;--teal:#256060;--gold:#8A6400;
  --bg:#F5F3EE;--white:#FFF;--gray:#333;--mid:#666;--light:#999;
  --border:#DDD;--green:#8FC49A;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;
  font-size:15px;line-height:1.7;background:var(--bg);color:var(--gray)}
.topbar{background:var(--navy);padding:13px 24px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50}
.topbar-logo{color:#fff;font-size:.9rem;font-weight:800;letter-spacing:.04em;text-decoration:none}
.topbar-logo span{color:var(--green)}
.btn-print{background:var(--green);color:var(--navy);padding:8px 16px;border-radius:6px;
  border:none;font-size:.8rem;font-weight:700;cursor:pointer;font-family:inherit}
.btn-pdf{background:#C05000;color:#fff;padding:8px 16px;border-radius:6px;
  border:none;font-size:.8rem;font-weight:700;cursor:pointer;font-family:inherit;margin-left:8px}
.btn-pdf:disabled{opacity:.6;cursor:not-allowed}
.container{max-width:900px;margin:0 auto;padding:24px 20px}
.sec{padding:36px 0;border-bottom:2px solid var(--border)}
.sec:last-child{border-bottom:none}
.sec h2{font-size:1.4rem;font-weight:800;color:var(--navy);margin-bottom:18px;
  padding-bottom:10px;border-bottom:2px solid var(--teal)}
.sec h3{font-size:1rem;font-weight:800;color:var(--navy);margin:16px 0 10px}
.card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
/* 커버 */
.cover{background:linear-gradient(135deg,var(--navy) 0%,var(--teal) 100%);
  border-radius:16px;padding:36px 28px;color:#fff;margin-bottom:28px;text-align:center}
.cover-brand{font-size:.75rem;font-weight:800;letter-spacing:.15em;color:rgba(255,255,255,.55);margin-bottom:12px}
.cover-church{font-size:1.8rem;font-weight:900;margin-bottom:6px}
.cover-title{font-size:1rem;color:rgba(255,255,255,.75);margin-bottom:20px}
.cover-stats{display:flex;justify-content:center;gap:24px;flex-wrap:wrap}
.cover-stat{text-align:center}
.cover-stat .num{font-size:1.8rem;font-weight:900;color:var(--green)}
.cover-stat .lbl{font-size:.75rem;color:rgba(255,255,255,.65)}
/* 유형 분포 */
.type-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px}
.type-card{background:#fff;border:1.5px solid var(--border);border-radius:10px;
  padding:14px 10px;text-align:center}
.tc-icon{font-size:1.8rem;margin-bottom:6px}
.tc-type{font-size:.78rem;font-weight:800;color:var(--teal)}
.tc-kr{font-size:.88rem;font-weight:700;color:var(--navy);margin-bottom:4px}
.tc-count{font-size:1.2rem;font-weight:900;color:var(--gold)}
.tc-bar{height:5px;background:#EEE;border-radius:3px;margin-top:8px;overflow:hidden}
.tc-bar-fill{height:100%;background:var(--teal);border-radius:3px}
/* AI 서술 박스 */
.ai-box{background:linear-gradient(135deg,#1A3055,#256060);border-radius:12px;
  padding:20px 22px;color:#fff;margin-bottom:14px}
.ai-box .ai-lbl{font-size:.72rem;color:rgba(255,255,255,.5);font-weight:700;
  letter-spacing:.1em;margin-bottom:8px}
.ai-box p{font-size:.9rem;line-height:1.85;font-style:italic;color:rgba(255,255,255,.9)}
.ai-shadow-box{background:linear-gradient(135deg,#3A1060,#5A2090)}
/* 강점·취약 */
.strength-list,.vuln-list{list-style:none;padding:0}
.strength-list li,.vuln-list li{padding:9px 0;border-bottom:1px solid #F0EDE8;
  font-size:.9rem;line-height:1.7;display:flex;gap:10px}
.strength-list li:last-child,.vuln-list li:last-child{border-bottom:none}
.strength-list li::before{content:'✦';color:var(--teal);flex-shrink:0;margin-top:2px}
.vuln-list li::before{content:'△';color:var(--gold);flex-shrink:0;margin-top:2px}
/* 동역 구조 */
.cowork-table{width:100%;border-collapse:collapse}
.cowork-table th{background:var(--navy);color:#fff;padding:10px 14px;
  font-size:.82rem;text-align:left}
.cowork-table td{padding:10px 14px;border-bottom:1px solid var(--border);
  font-size:.85rem;vertical-align:top;line-height:1.65}
.cowork-table tr:last-child td{border-bottom:none}
/* 팀원 목록 */
.member-row{display:flex;align-items:center;gap:14px;padding:12px 0;
  border-bottom:1px solid #F0EDE8}
.member-row:last-child{border-bottom:none}
.mr-icon{font-size:1.6rem;width:40px;text-align:center;flex-shrink:0}
.mr-info{flex:1}
.mr-name{font-size:.92rem;font-weight:700;color:var(--navy)}
.mr-meta{font-size:.78rem;color:var(--mid)}
.mr-type{font-size:.8rem;font-weight:800;color:var(--teal)}
/* 워크숍 섹션 */
.ws-step{background:#fff;border:1px solid var(--border);border-radius:12px;
  margin-bottom:16px;overflow:hidden}
.ws-header{display:flex;align-items:center;gap:14px;padding:16px 18px;
  background:linear-gradient(90deg,rgba(26,48,85,.04),transparent)}
.ws-num{background:var(--gold);color:#fff;width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:.85rem;
  font-weight:800;flex-shrink:0}
.ws-header-info{flex:1}
.ws-title{font-size:.95rem;font-weight:800;color:var(--navy);margin-bottom:2px}
.ws-time{font-size:.75rem;color:var(--gold);font-weight:700}
.ws-body{padding:0 18px 16px}
.ws-purpose{font-size:.82rem;color:var(--mid);line-height:1.7;margin-bottom:10px;
  padding:8px 12px;background:#F8F6F0;border-radius:6px}
.ws-script-wrap{margin-bottom:10px}
.ws-script-label{font-size:.73rem;font-weight:800;color:var(--teal);letter-spacing:.06em;
  margin-bottom:5px}
.ws-script{background:rgba(37,96,96,.06);border-left:3px solid var(--teal);
  border-radius:0 8px 8px 0;padding:12px 14px;font-size:.85rem;
  font-style:italic;color:#1A4A4A;line-height:1.85}
.ws-activity-wrap{margin-bottom:8px}
.ws-activity-label{font-size:.73rem;font-weight:800;color:var(--gold);letter-spacing:.06em;
  margin-bottom:5px}
.ws-activity{background:#FFF8E6;border:1px solid #F0D890;border-radius:8px;
  padding:12px 14px;font-size:.85rem;line-height:1.75}
.ws-activity strong{color:var(--gold)}
.ws-tips{margin-top:8px}
.ws-tips-label{font-size:.73rem;font-weight:800;color:#8B1A1A;letter-spacing:.06em;margin-bottom:5px}
.ws-tips ul{list-style:none;padding:0}
.ws-tips ul li{font-size:.82rem;color:#6B1A1A;line-height:1.7;padding:3px 0;
  padding-left:14px;position:relative}
.ws-tips ul li::before{content:'⚠';position:absolute;left:0;font-size:.72rem}
.ws-checklist{background:#F0F7F4;border:1px solid rgba(37,96,96,.2);border-radius:8px;
  padding:12px 14px;margin-top:8px}
.ws-checklist-label{font-size:.73rem;font-weight:800;color:var(--teal);letter-spacing:.06em;margin-bottom:6px}
.ws-checklist ul{list-style:none;padding:0}
.ws-checklist ul li{font-size:.82rem;color:var(--gray);line-height:1.7;padding:2px 0;
  padding-left:20px;position:relative}
.ws-checklist ul li::before{content:'☐';position:absolute;left:0;color:var(--teal)}
.tag{display:inline-block;background:rgba(37,96,96,.1);color:var(--teal);
  font-size:.72rem;font-weight:700;padding:3px 8px;border-radius:4px;margin:2px}
.loading-wrap{text-align:center;padding:80px 20px;color:var(--mid)}
.spin{font-size:2.5rem;animation:spin 1.2s linear infinite;display:inline-block;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
@media print{
  .topbar,.btn-print,.btn-pdf{display:none!important}
  body{background:#fff!important;margin:0!important;padding:0!important}
  .container{padding:0!important;max-width:100%!important}
  .sec{page-break-inside:avoid}
}
</style>
</head>

async function init() {
  if (!CODE) {
    document.getElementById('loading-wrap').innerHTML =
      '<div style="color:var(--mid)">코드가 없습니다. 올바른 링크인지 확인하세요.</div>';
    return;
  }

  try {
    // sessionStorage 캐시 먼저 확인
    let data = null;
    const cached = sessionStorage.getItem('tb_report_data_' + CODE);
    if (cached) {
      try { data = JSON.parse(cached); } catch(e){}
    }

    if (!data) {
      // Edge Function 호출 (DB 캐시 or 새 생성)
      const res = await fetch(EDGE_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY },
        body: JSON.stringify({ code: CODE, mode: 'all' }),
      });
      if (!res.ok) { const e = await res.json(); throw new Error(e.error || '서버 오류'); }
      data = await res.json();
      sessionStorage.setItem('tb_report_data_' + CODE, JSON.stringify(data));
    }

    renderReport(data);
  } catch(e) {
    document.getElementById('loading-wrap').innerHTML =
      `<div style="color:#C00;font-size:.9rem">❌ 오류: ${e.message}</div>`;
  }
}

function downloadPDF() {
  const btn = document.getElementById('btn-pdf');
  if (!btn) return;
  btn.disabled = true;
  btn.textContent = '⏳ 생성 중...';

  // 스크롤 최상단으로 이동 (공백 페이지 방지 핵심)
  window.scrollTo(0, 0);

  const el = document.getElementById('report-wrap');
  const church = CHURCH || CODE || '팀리포트';
  const filename = `쉐도우그램_팀리포트_${church}.pdf`;

  // topbar 임시 숨김 (캡처 영역 오프셋 문제 방지)
  const topbar = document.querySelector('.topbar');
  const origTopbarDisplay = topbar ? topbar.style.display : '';
  if (topbar) topbar.style.display = 'none';

  const opt = {
    margin: [8, 8, 8, 8],
    filename,
    image: { type: 'jpeg', quality: 0.92 },
    html2canvas: {
      scale: 2,
      useCORS: true,
      logging: false,
      scrollX: 0,
      scrollY: 0,
      windowWidth: document.documentElement.scrollWidth,
    },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
    pagebreak: { mode: 'css', before: '.pdf-page-break' },
  };

  html2pdf().set(opt).from(el).save()
    .then(() => {
      if (topbar) topbar.style.display = origTopbarDisplay;
      btn.disabled = false;
      btn.textContent = '📄 PDF 저장';
    })
    .catch(e => {
      if (topbar) topbar.style.display = origTopbarDisplay;
      console.error('PDF error:', e);
      btn.disabled = false;
      btn.textContent = '📄 PDF 저장';
      alert('PDF 생성 중 오류가 발생했습니다. 인쇄 버튼을 이용해주세요.');
    });
}

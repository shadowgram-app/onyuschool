<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>선교팀 리포트 - 온유스쿨</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --navy: #1A3055;
      --teal: #256060;
      --gold: #8A6400;
      --bg: #F5F3EE;
      --white: #FFF;
      --gray: #333;
      --mid: #666;
      --light: #999;
      --border: #D5D0C8;
      --green: #8FC49A;
    }

    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
      background: var(--bg);
      color: var(--gray);
      line-height: 1.6;
    }

    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg);
    }

    .loading-spinner {
      font-size: 3rem;
      animation: spin 2s linear infinite;
      margin-bottom: 1rem;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-text {
      color: var(--teal);
      font-size: 1.2rem;
      font-weight: 500;
    }

    .report-wrapper {
      max-width: 900px;
      margin: 0 auto;
      background: var(--white);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      position: relative;
    }

    /* Cover Section */
    .cover {
      background: linear-gradient(135deg, var(--navy) 0%, var(--teal) 100%);
      color: var(--white);
      padding: 60px 40px;
      text-align: center;
      page-break-after: avoid;
      position: relative;
    }

    .cover-header {
      margin-bottom: 40px;
    }

    .cover-title {
      font-size: 2.8rem;
      font-weight: 700;
      margin-bottom: 10px;
      letter-spacing: -0.5px;
    }

    .cover-subtitle {
      font-size: 1.2rem;
      opacity: 0.9;
      margin-bottom: 5px;
    }

    .cover-meta {
      font-size: 0.95rem;
      opacity: 0.85;
      margin-top: 20px;
      line-height: 1.8;
    }

    .cover-meta-item {
      margin: 8px 0;
    }

    .cover-footer {
      margin-top: 50px;
      font-size: 0.9rem;
      opacity: 0.8;
    }

    /* Section Styles */
    .sec {
      padding: 40px;
      border-bottom: 1px solid var(--border);
      page-break-inside: avoid;
    }

    .sec:last-child {
      border-bottom: none;
    }

    .sec-title {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 25px;
      padding-bottom: 12px;
      border-bottom: 3px solid var(--gold);
      display: inline-block;
    }

    .sec-content {
      margin-top: 20px;
    }

    /* Team Composition */
    .type-distribution {
      background: var(--bg);
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 25px;
    }

    .type-bar-item {
      margin-bottom: 20px;
    }

    .type-bar-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 0.95rem;
      font-weight: 600;
    }

    .type-bar-label-name {
      color: var(--gray);
    }

    .type-bar-label-count {
      color: var(--mid);
    }

    .type-bar {
      height: 32px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }

    .type-bar-fill {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 10px;
      color: var(--white);
      font-weight: 600;
      font-size: 0.9rem;
    }

    .team-members {
      margin-top: 25px;
    }

    .member-badge {
      display: inline-block;
      margin-right: 10px;
      margin-bottom: 10px;
      padding: 8px 12px;
      border-radius: 20px;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--white);
      background: var(--teal);
    }

    .team-summary {
      margin-top: 20px;
      padding: 16px;
      background: #EBF5F7;
      border-left: 4px solid var(--teal);
      font-size: 0.95rem;
      line-height: 1.7;
      color: var(--gray);
    }

    /* Role Assignment */
    .roles-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .role-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      background: var(--white);
    }

    .role-card:hover {
      box-shadow: 0 2px 12px rgba(26, 48, 85, 0.1);
    }

    .role-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 15px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .role-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--navy);
    }

    .role-member {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .member-name {
      font-weight: 600;
      color: var(--gray);
    }

    .member-type-badge {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--white);
    }

    .role-description {
      font-size: 0.95rem;
      color: var(--mid);
      margin-bottom: 16px;
      line-height: 1.6;
    }

    .role-guide {
      background: var(--bg);
      padding: 14px;
      border-radius: 6px;
    }

    .role-guide-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .role-guide-list {
      list-style: none;
      font-size: 0.9rem;
      color: var(--gray);
    }

    .role-guide-list li {
      margin-bottom: 8px;
      padding-left: 18px;
      position: relative;
      line-height: 1.5;
    }

    .role-guide-list li:before {
      content: '•';
      position: absolute;
      left: 0;
      color: var(--teal);
      font-weight: bold;
    }

    /* Leader's Guide */
    .guide-section {
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .guide-section:last-child {
      border-bottom: none;
    }

    .guide-subtitle {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 12px;
    }

    .guide-content {
      font-size: 0.95rem;
      color: var(--mid);
      line-height: 1.7;
    }

    .guide-box {
      background: var(--bg);
      padding: 14px;
      border-radius: 6px;
      margin-top: 10px;
      border-left: 3px solid var(--gold);
    }

    /* Spiritual Growth */
    .growth-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .growth-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      page-break-inside: avoid;
    }

    .growth-card-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--gold);
    }

    .growth-item {
      margin-bottom: 14px;
    }

    .growth-label {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--navy);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 4px;
    }

    .growth-text {
      font-size: 0.9rem;
      color: var(--gray);
      line-height: 1.6;
    }

    .growth-prayer {
      padding: 10px;
      background: #F0E8E0;
      border-left: 3px solid var(--teal);
      font-size: 0.9rem;
      font-style: italic;
      color: var(--gray);
      line-height: 1.6;
    }

    /* Footer */
    .report-footer {
      padding: 20px 40px;
      text-align: center;
      font-size: 0.85rem;
      color: var(--light);
      background: var(--bg);
      border-top: 1px solid var(--border);
    }

    /* Print Styles */
    @media print {
      body {
        background: var(--white);
      }

      .no-print {
        display: none !important;
      }

      .sec {
        page-break-inside: avoid;
      }

      .report-wrapper {
        box-shadow: none;
        margin: 0;
      }

      .report-footer {
        page-break-inside: avoid;
      }
    }

    /* Utility Classes */
    .error-container {
      padding: 40px;
      text-align: center;
      color: #A53860;
      background: #F5EEE8;
      border-radius: 8px;
      margin: 40px;
    }

    .error-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .error-message {
      font-size: 0.95rem;
      line-height: 1.6;
    }
  </style>
</head>

    // ========== UTILITY FUNCTIONS ==========
    function getTypeFromRole(sg_type) {
      // Map sg_type to TYPE_DATA key
      const typeMap = {
        'SPARK': 'SPARK',
        'VISION': 'VISION',
        'STEADY': 'STEADY',
        'PLAYER': 'PLAYER',
        'HARMONY': 'HARMONY',
        'SOUL': 'SOUL',
        'LOGIC': 'LOGIC',
        'LEADER': 'LEADER'
      };
      return typeMap[sg_type] || sg_type;
    }

    function getDimensionScoreFallback(type, dim) {
      // Fallback scoring based on type when dim_scores not available
      const fallback = {
        SPARK: { Fe: 8, Ne: 9, Fi: 6, Ni: 7, Se: 6, Si: 4, Te: 5, Ti: 5 },
        VISION: { Fe: 5, Ne: 8, Fi: 7, Ni: 9, Se: 4, Si: 6, Te: 7, Ti: 8 },
        STEADY: { Fe: 6, Ne: 4, Fi: 7, Ni: 5, Se: 5, Si: 9, Te: 7, Ti: 6 },
        PLAYER: { Fe: 5, Ne: 7, Fi: 4, Ni: 5, Se: 9, Si: 6, Te: 8, Ti: 5 },
        HARMONY: { Fe: 9, Ne: 6, Fi: 8, Ni: 5, Se: 6, Si: 7, Te: 4, Ti: 3 },
        SOUL: { Fe: 7, Ne: 6, Fi: 9, Ni: 8, Se: 4, Si: 5, Te: 3, Ti: 6 },
        LOGIC: { Fe: 3, Ne: 6, Fi: 4, Ni: 7, Se: 5, Si: 6, Te: 9, Ti: 9 },
        LEADER: { Fe: 6, Ne: 7, Fi: 5, Ni: 7, Se: 7, Si: 5, Te: 9, Ti: 7 }
      };
      return (fallback[type] && fallback[type][dim]) || 5;
    }

    function calculateRoleScores(members) {
      const scores = {};

      for (const roleKey in MISSION_ROLES) {
        const role = MISSION_ROLES[roleKey];
        const dim1 = role.dims[0];
        const dim2 = role.dims[1];

        for (const member of members) {
          if (!scores[member.id]) {
            scores[member.id] = {};
          }

          const type = getTypeFromRole(member.sg_type);
          const score1 = member.dim_scores && member.dim_scores[dim1]
            ? member.dim_scores[dim1]
            : getDimensionScoreFallback(type, dim1);
          const score2 = member.dim_scores && member.dim_scores[dim2]
            ? member.dim_scores[dim2]
            : getDimensionScoreFallback(type, dim2);

          scores[member.id][roleKey] = score1 + score2;
        }
      }

      return scores;
    }

    function assignRoles(members) {
      const scores = calculateRoleScores(members);
      const assignments = {};
      const memberAssigned = new Set();

      // Sort roles by max score (greedy approach)
      const rolesWithMaxScore = [];
      for (const roleKey in MISSION_ROLES) {
        let maxScore = -1;
        let maxMemberId = null;

        for (const member of members) {
          if (!memberAssigned.has(member.id) && scores[member.id][roleKey] > maxScore) {
            maxScore = scores[member.id][roleKey];
            maxMemberId = member.id;
          }
        }

        if (maxMemberId !== null) {
          rolesWithMaxScore.push({
            roleKey,
            maxScore,
            memberId: maxMemberId
          });
        }
      }

      // Sort by score descending
      rolesWithMaxScore.sort((a, b) => b.maxScore - a.maxScore);

      // Assign roles greedily
      for (const item of rolesWithMaxScore) {
        assignments[item.roleKey] = item.memberId;
        memberAssigned.add(item.memberId);
      }

      return assignments;
    }

    function getTypeDistribution(members) {
      const dist = {};
      for (const type in TYPE_DATA) {
        dist[type] = 0;
      }

      for (const member of members) {
        const type = getTypeFromRole(member.sg_type);
        dist[type]++;
      }

      return dist;
    }

    function getTopTypes(typeDistribution) {
      const entries = Object.entries(typeDistribution)
        .filter(([_, count]) => count > 0)
        .sort((a, b) => b[1] - a[1]);

      return entries.slice(0, 2).map(([type, _]) => type);
    }

    function getTypeAdjective(topTypes) {
      const adjectives = {
        'SPARK': '역동적이고 창의적인',
        'VISION': '통찰력 있고 전략적인',
        'STEADY': '안정적이고 신뢰할 수 있는',
        'PLAYER': '현장감 있고 실행력 강한',
        'HARMONY': '따뜻하고 배려심 있는',
        'SOUL': '깊이 있고 의미 있는',
        'LOGIC': '체계적이고 정밀한',
        'LEADER': '추진력 있고 목표지향적인'
      };

      if (topTypes.length === 0) return '균형잡힌';
      return adjectives[topTypes[0]] || '역동적인';
    }

    function getTypeStrength(type) {
      const strengths = {
        'SPARK': '열정과 영감',
        'VISION': '통찰력과 비전',
        'STEADY': '신뢰성과 안정성',
        'PLAYER': '현장감과 실행력',
        'HARMONY': '공감과 돌봄',
        'SOUL': '깊이와 의미',
        'LOGIC': '분석력과 정확성',
        'LEADER': '결단력과 영향력'
      };
      return strengths[type] || '강점';
    }

    function getConflictPoints(members) {
      const types = new Set(members.map(m => getTypeFromRole(m.sg_type)));
      const conflicts = [];

      const conflictPairs = ['SPARK-STEADY', 'VISION-PLAYER', 'HARMONY-LOGIC', 'SOUL-LEADER'];

      for (const pair of conflictPairs) {
        const [type1, type2] = pair.split('-');
        if (types.has(type1) && types.has(type2)) {
          conflicts.push(pair);
        }
      }

      return conflicts;
    }

    function getPresentTypes(members) {
      const types = new Set(members.map(m => getTypeFromRole(m.sg_type)));
      return Array.from(types).sort();
    }

      html += renderCover(workshop);
      html += renderTeamComposition(members);
      html += renderRoleAssignments(members, assignments);
      html += renderLeaderGuide(members);
      html += renderSpiritualGrowth(members);
      html += renderFooter();
      html += '</div>';

      return html;
    }

    // ========== SUPABASE FUNCTIONS ==========
    async function fetchWithAuth(url, options = {}) {
      const headers = {
        'apikey': SB_KEY,
        'Authorization': `Bearer ${SB_KEY}`,
        'Content-Type': 'application/json',
        ...options.headers
      };

      const response = await fetch(url, {
        ...options,
        headers
      });

      if (!response.ok) {
        throw new Error(`Supabase request failed: ${response.status}`);
      }

      return response.json();
    }

    async function getMissionWorkshop(code) {
      const url = `${SB_URL}/rest/v1/mission_workshops?code=eq.${code}`;
      const data = await fetchWithAuth(url);
      return data && data.length > 0 ? data[0] : null;
    }

    async function getMissionResults(workshopCode) {
      const url = `${SB_URL}/rest/v1/mission_results?workshop_code=eq.${workshopCode}`;
      const data = await fetchWithAuth(url);
      return data || [];
    }

    async function updateWorkshopReportData(workshopCode, reportData) {
      const url = `${SB_URL}/rest/v1/mission_workshops?code=eq.${workshopCode}`;
      await fetchWithAuth(url, {
        method: 'PATCH',
        body: JSON.stringify({ report_data: reportData })
      });
    }

    // ========== MAIN FLOW ==========
    async function main() {
      try {
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');

        if (!code) {
          document.getElementById('app').innerHTML = `
            <div class="error-container">
              <div class="error-title">오류</div>
              <div class="error-message">올바른 코드가 제공되지 않았습니다. URL에 ?code=xxx 파라미터를 확인하세요.</div>
            </div>
          `;
          return;
        }

        // Fetch workshop
        const workshop = await getMissionWorkshop(code);
        if (!workshop) {
          document.getElementById('app').innerHTML = `
            <div class="error-container">
              <div class="error-title">오류</div>
              <div class="error-message">해당 코드의 선교팀을 찾을 수 없습니다.</div>
            </div>
          `;
          return;
        }

        // Fetch results
        let results = await getMissionResults(workshop.code);

        // Transform results
        const members = results.map(result => ({
          id: result.id || result.name,
          name: result.name || '(미입력)',
          sg_type: result.sg_type || 'SPARK',
          dim_scores: result.dim_scores ? JSON.parse(typeof result.dim_scores === 'string' ? result.dim_scores : JSON.stringify(result.dim_scores)) : null
        }));

        // Render report
        const reportHtml = renderReport(workshop, members);
        document.getElementById('app').innerHTML = reportHtml;

        // Cache report if not already cached
        if (!workshop.report_data) {
          try {
            await updateWorkshopReportData(workshop.code, {
              rendered_at: new Date().toISOString(),
              member_count: members.length
            });
          } catch (e) {
            console.log('Could not cache report:', e);
          }
        }

      } catch (error) {
        console.error('Error loading report:', error);
        document.getElementById('app').innerHTML = `
          <div class="error-container">
            <div class="error-title">오류 발생</div>
            <div class="error-message">보고서를 불러오는 중에 오류가 발생했습니다. 잠시 후 다시 시도해주세요.</div>
          </div>
        `;
      }
    }

    // Run on load
    document.addEventListener('DOMContentLoaded', main);
  </script>
</body>

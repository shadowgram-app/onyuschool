async function init() {
  if (!CODE || !NAME) {
    showError('잘못된 접근입니다. 올바른 링크인지 확인하세요.');
    return;
  }

  try {
    // DB에서 워크숍 report_data 조회
    const wRes = await fetch(
      `${SB_URL}/rest/v1/workshops?code=eq.${CODE}&select=report_data,church_name,status`,
      { headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY } }
    );
    const wsArr = await wRes.json();
    const ws = wsArr?.[0];
    if (ws?.church_name) document.getElementById('top-church').textContent = ws.church_name;

    let memberData = null;

    // report_data에서 본인 데이터 추출
    if (ws?.report_data?.results) {
      const found = ws.report_data.results.find(r => r.name === NAME);
      if (found) {
        const indAI = (ws.report_data.individualAI || []).find(i => i.name === NAME);
        memberData = { ...found, aiData: indAI || null };
      }
    }

    // report_data 없으면 survey_results에서 직접 조회
    if (!memberData) {
      const rRes = await fetch(
        `${SB_URL}/rest/v1/survey_results?workshop_code=eq.${CODE}&name=eq.${encodeURIComponent(NAME)}&select=*&limit=1`,
        { headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY } }
      );
      const rArr = await rRes.json();
      if (rArr?.[0]) memberData = { ...rArr[0], aiData: null };
    }

    if (!memberData) {
      showError(`"${NAME}"님의 검사 결과를 찾을 수 없습니다.`);
      return;
    }

    renderReport(memberData, ws);

  } catch(e) {
    showError('데이터를 불러오는 중 오류가 발생했습니다: ' + e.message);
  }
}

function renderReport(member, ws) {
  const d = TYPE_DETAIL[member.sg_type];
  if (!d) { showError('유형 데이터를 찾을 수 없습니다 (' + member.sg_type + ')'); return; }

  const aiCaption = member.aiData?.shadowCaption || null;
  const aiNarrative = member.aiData?.personalNarrative || null;

  const html = `
    <!-- 히어로 헤더 -->
    <div class="hero" style="background:linear-gradient(135deg,${d.color}CC 0%,${d.color}88 100%)">
      <div class="hero-icon">${d.icon}</div>
      <div class="hero-type">${member.name}님은 <strong>${d.kr}형</strong>입니다</div>
      <div class="hero-kr">${d.fn}</div>
      <div class="hero-tagline">"${d.tagline}"</div>
    </div>

    ${aiNarrative ? `
    <div class="ai-caption">
      <div class="ai-label">✨ AI 맞춤 서술 — ${member.role || '팀원'} 역할 기반</div>
      <p>${aiNarrative}</p>
    </div>` : ''}

    ${aiCaption ? `
    <div class="ai-caption" style="background:linear-gradient(135deg,#3A1060,#5A2090)">
      <div class="ai-label">🌗 쉐도우그램 캡션</div>
      <p>${aiCaption}</p>
    </div>` : ''}

    <!-- 고유기능 특성 -->
    <div class="card">
      <div class="card-title"><span class="ico">${d.icon}</span>${d.kr}형의 고유 특성 20</div>
      <ul class="trait-list">
        ${d.traits.map(t => `<li>${t}</li>`).join('')}
      </ul>
    </div>

    <!-- 빛과 그림자 -->
    <div class="card">
      <div class="card-title"><span class="ico">🌗</span>빛과 그림자</div>
      <div class="light-box">
        <h4>🌟 빛 — 이 유형의 강점</h4>
        <p>${d.light}</p>
      </div>
      <div class="shadow-box">
        <h4>⚠️ 그림자 — 보완이 필요한 부분</h4>
        <p>${d.shadow}</p>
      </div>
    </div>

    <!-- 이 팀에서의 역할 -->
    <div class="card">
      <div class="card-title"><span class="ico">🤝</span>이 팀에서 ${member.name}님의 역할</div>
      <div class="role-grid">
        ${d.teamRoles.map(r => `
        <div class="role-card">
          <div class="rc-icon">${r.icon}</div>
          <div class="rc-title">${r.title}</div>
          <div class="rc-desc">${r.desc}</div>
        </div>`).join('')}
      </div>
    </div>

    <!-- 그림자 보완 성장 스텝 -->
    <div class="card">
      <div class="card-title"><span class="ico">🌱</span>그림자를 보완하는 성장 스텝</div>
      ${d.growthSteps.map((s, i) => `
      <div class="growth-step">
        <div class="gs-num">${i+1}</div>
        <div class="gs-text">${s}</div>
      </div>`).join('')}
    </div>

    <!-- 유형 태그 -->
    <div class="card" style="text-align:center;padding:16px">
      <div style="font-size:.8rem;color:var(--mid);margin-bottom:8px">쉐도우그램 유형</div>
      <span class="tag">${member.sg_type}</span>
      <span class="tag">${d.fn}</span>
      <span class="tag">${d.kr}형</span>
      ${member.role ? `<span class="tag">${member.role}</span>` : ''}
      <div style="margin-top:14px;font-size:.78rem;color:var(--light)">
        온유스쿨 쉐도우그램 · ${ws?.church_name || ''} 팀빌딩
      </div>
    </div>
  `;

  document.getElementById('loading-wrap').style.display = 'none';
  document.getElementById('report-wrap').style.display = 'block';
  document.getElementById('report-wrap').innerHTML = html;

  // PDF 버튼 표시 (리포트 로드 완료 후)
  const pdfBtn = document.getElementById('btn-pdf');
  if (pdfBtn) {
    pdfBtn.style.display = 'block';
    pdfBtn.setAttribute('data-name', member.name || NAME);
    pdfBtn.setAttribute('data-type', d.kr || '');
  }
}

function downloadPDF() {
  const btn = document.getElementById('btn-pdf');
  if (!btn) return;
  const memberName = btn.getAttribute('data-name') || NAME || '팀원';
  const typeName   = btn.getAttribute('data-type') || '';
  btn.disabled = true;
  btn.textContent = '⏳ 생성 중...';

  const el = document.getElementById('report-wrap');
  const filename = `쉐도우그램_개인리포트_${memberName}(${typeName}).pdf`;

  const opt = {
    margin: [10, 10, 10, 10],
    filename,
    image: { type: 'jpeg', quality: 0.92 },
    html2canvas: { scale: 1.8, useCORS: true, logging: false },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
    pagebreak: { mode: ['avoid-all', 'css', 'legacy'] },
  };

  html2pdf().set(opt).from(el).save()
    .then(() => {
      btn.disabled = false;
      btn.textContent = '📄 PDF 저장';
    })
    .catch(e => {
      console.error('PDF error:', e);
      btn.disabled = false;
      btn.textContent = '📄 PDF 저장';
      alert('PDF 생성 중 오류가 발생했습니다.');
    });
}

function showError(msg) {
  document.getElementById('loading-wrap').style.display = 'none';
  document.getElementById('error-wrap').style.display = 'block';
  document.getElementById('error-msg').textContent = msg;
}

init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자녀양육 검사 — 온유스쿨</title>
<style>
:root{
  --navy:#1A3055;--teal:#256060;--gold:#8A6400;
  --bg:#F5F3EE;--white:#FFF;--gray:#333;
  --mid:#666;--light:#999;--border:#DDD;--green:#8FC49A;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;
  font-size:15px;line-height:1.7;background:var(--bg);color:var(--gray)}
.screen{display:none}.screen.active{display:block;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.container{max-width:820px;margin:0 auto;padding:0 20px}
/* topbar */
.topbar{background:var(--navy);padding:13px 24px;display:flex;align-items:center;
  justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-logo{color:#fff;font-size:.9rem;font-weight:800;letter-spacing:.04em;text-decoration:none}
.topbar-logo span{color:var(--green)}
/* section */
.sec{padding:40px 0 56px}
.card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:30px 26px}
/* error screen */
.error-box{background:#FFE8E8;border:1px solid #FF9999;border-radius:10px;padding:24px;
  text-align:center;margin-bottom:24px}
.error-box h3{color:#C00;margin-bottom:8px}
/* intro screen */
.intro-title{font-size:1.3rem;font-weight:700;color:var(--navy);margin-bottom:12px}
.intro-subtitle{font-size:.95rem;color:var(--mid);margin-bottom:28px;line-height:1.6}
.intro-buttons{display:flex;flex-direction:column;gap:12px}
.btn-intro{padding:16px;background:var(--navy);color:#fff;border:none;border-radius:8px;
  font-size:.95rem;font-weight:700;cursor:pointer;font-family:inherit;transition:background .2s}
.btn-intro:hover{background:#102540}
.btn-intro-alt{background:transparent;border:1.5px solid var(--border);color:var(--mid)}
.btn-intro-alt:hover{border-color:var(--navy);color:var(--navy)}
/* 8유형 선택 그리드 */
.type-select-wrap{display:none;margin-top:24px}
.type-select-label{font-size:.9rem;font-weight:700;color:var(--navy);margin-bottom:16px}
.type-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
@media(max-width:600px){.type-grid{grid-template-columns:repeat(2,1fr)}}
.type-card{border:1.5px solid var(--border);border-radius:10px;padding:16px;text-align:center;
  cursor:pointer;transition:all .2s;background:var(--white)}
.type-card:hover{border-color:var(--navy);background:rgba(26,48,85,.03)}
.type-card.selected{border-color:var(--navy);background:rgba(26,48,85,.1);box-shadow:0 2px 8px rgba(26,48,85,.1)}
.type-card-icon{font-size:2rem;margin-bottom:6px}
.type-card-name{font-size:.85rem;font-weight:700;color:var(--navy);margin-bottom:4px}
.type-card-keywords{font-size:.7rem;color:var(--light);line-height:1.4}
.type-select-btn{padding:14px;background:var(--navy);color:#fff;border:none;border-radius:8px;
  font-size:.95rem;font-weight:700;cursor:pointer;font-family:inherit;transition:background .2s;width:100%}
.type-select-btn:hover{background:#102540}
.type-select-btn:disabled{background:var(--border);color:var(--light);cursor:default}
/* quiz */
.quiz-header{background:var(--navy);color:#fff;padding:16px 26px;border-radius:10px 10px 0 0;
  margin:-30px -26px 0}
.quiz-header-user{font-size:.85rem;color:rgba(255,255,255,.73);margin-bottom:6px}
.quiz-header-user strong{color:#fff;font-weight:800}
.quiz-prog{background:rgba(255,255,255,.2);border-radius:10px;height:4px;margin-top:12px;overflow:hidden}
.quiz-prog-fill{background:#fff;height:100%;transition:width .3s}
.quiz-content{padding:30px 26px}
.q-badge{display:inline-block;background:rgba(26,48,85,.08);color:var(--navy);
  font-size:.75rem;font-weight:800;padding:4px 10px;border-radius:6px;margin-bottom:12px}
.q-num{font-size:.85rem;color:var(--light)}
.q-text{font-size:1.15rem;font-weight:700;color:var(--navy);margin:12px 0 24px;line-height:1.5}
.scale-list{list-style:none;margin-bottom:32px}
.scale-item{display:flex;gap:10px;margin-bottom:12px;cursor:pointer}
.scale-radio{width:20px;height:20px;border:2px solid var(--border);border-radius:50%;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  transition:border-color .2s,background .2s}
.scale-item input[type="radio"]:checked ~ .scale-radio{
  border-color:var(--navy);background:var(--navy)}
.scale-item input[type="radio"]:checked ~ .scale-radio::after{
  content:'✓';color:#fff;font-weight:700;font-size:.85rem}
.scale-item input[type="radio"]{display:none}
.scale-text{flex:1;font-size:.95rem;color:var(--gray);padding-top:2px}
/* A/B 카드 */
.ab-wrap{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:32px}
.ab-card{border:1.5px solid var(--border);border-radius:10px;padding:18px;text-align:center;
  cursor:pointer;transition:all .2s;background:var(--white);min-height:100px;
  display:flex;flex-direction:column;justify-content:center;align-items:center}
.ab-card:hover{border-color:var(--navy);background:rgba(26,48,85,.03)}
.ab-card.selected{border-color:var(--navy);background:rgba(26,48,85,.1);box-shadow:0 2px 8px rgba(26,48,85,.1)}
.ab-card-label{font-size:.75rem;color:var(--light);font-weight:700;margin-bottom:8px}
.ab-card-text{font-size:.95rem;color:var(--gray);line-height:1.5;font-weight:500}
.quiz-btns{display:flex;gap:12px}
.btn-q{flex:1;padding:14px;border-radius:8px;border:none;font-size:.95rem;
  font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-prev{background:transparent;border:1.5px solid var(--border);color:var(--mid)}
.btn-prev:hover{border-color:var(--navy);color:var(--navy)}
.btn-next{background:var(--navy);color:#fff}
.btn-next:hover{background:#102540}
.btn-next:disabled{background:var(--border);color:var(--light);cursor:default}
/* result */
.result-header{text-align:center;padding:24px 26px;background:linear-gradient(135deg,var(--navy) 0%,#1E4070 100%);
  color:#fff;border-radius:10px 10px 0 0;margin:-30px -26px 0}
.result-icon{font-size:2.8rem;margin-bottom:12px}
.result-type{font-size:1.6rem;font-weight:800;margin-bottom:6px}
.result-keywords{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:12px}
.kw{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);
  color:#fff;padding:6px 12px;border-radius:16px;font-size:.8rem;font-weight:700}
.result-content{padding:30px 26px}
.result-note{background:#FFF8E6;border:1px solid #E8D8A0;border-radius:8px;
  padding:12px 15px;font-size:.85rem;color:#7A6000;margin-bottom:18px;line-height:1.65}
.result-actions{display:flex;gap:12px;margin-top:24px}
.btn-p{flex:1;padding:14px;background:var(--navy);color:#fff;border:none;
  border-radius:8px;font-size:.95rem;font-weight:700;cursor:pointer;font-family:inherit;
  transition:background .2s;text-decoration:none;display:flex;align-items:center;
  justify-content:center}
.btn-p:hover{background:#102540}
/* spinner */
.spinner{display:flex;align-items:center;justify-content:center;min-height:300px}
.spinner-ring{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--navy);
  border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
footer{background:#F0F4F8;border-top:1px solid var(--border);padding:22px 20px;
  text-align:center;font-size:.73rem;color:var(--light)}
</style>
</head>
<body>

<div class="topbar">
  <a class="topbar-logo" href="https://onyuschool.com">ONYUSCHOOL <span>쉐도우그램</span></a>
</div>

<!-- SCREEN: 로딩 -->
<div id="screen-loading" class="screen active">
  <div class="container"><div class="sec">
    <div class="card">
      <div class="spinner">
        <div class="spinner-ring"></div>
      </div>
    </div>
  </div></div>
</div>

<!-- SCREEN: 에러 -->
<div id="screen-error" class="screen">
  <div class="container"><div class="sec">
    <div class="card">
      <div class="error-box">
        <h3>오류가 발생했습니다</h3>
        <p id="error-message"></p>
      </div>
      <button class="btn-p" onclick="location.href='/'">홈으로 돌아가기</button>
    </div>
  </div></div>
</div>

<!-- SCREEN: 인트로 (유형 직접 선택 또는 검사 시작) -->
<div id="screen-intro" class="screen">
  <div class="container"><div class="sec">
    <div class="card">
      <div style="margin-bottom:24px">
        <div class="intro-title"><span id="intro-name"></span>님 안녕하세요!</div>
        <div class="intro-subtitle">검사를 시작하기 전에 — 이미 쉐도우그램 유형을 알고 계신가요?</div>
      </div>

      <div class="intro-buttons" id="intro-buttons">
        <button class="btn-intro" onclick="startTypeSelect()">이미 유형을 알아요 →</button>
        <button class="btn-intro btn-intro-alt" onclick="startSurvey()">처음이에요 — 검사 시작 →</button>
      </div>

      <!-- 8유형 선택 그리드 (숨겨짐, startTypeSelect() 시 표시) -->
      <div class="type-select-wrap" id="type-select-wrap">
        <div class="type-select-label">쉐도우그램 유형을 선택하세요</div>
        <div class="type-grid" id="type-grid"></div>
        <button class="type-select-btn" id="btn-select-type" onclick="selectTypeSubmit()" disabled>이 유형으로 등록</button>
      </div>
    </div>
  </div></div>
</div>

<!-- SCREEN: 검사 -->
<div id="screen-survey" class="screen">
  <div class="container"><div class="sec">
    <div class="card">
      <div class="quiz-header">
        <div class="quiz-header-user">
          <span id="user-role">검사 중</span><strong id="user-name"></strong>
        </div>
        <div class="quiz-prog">
          <div class="quiz-prog-fill" id="prog-fill"></div>
        </div>
      </div>
      <div class="quiz-content">
        <div class="q-badge">
          <span class="q-num">Q<span id="q-num">1</span></span> · <span id="q-badge">질문</span>
        </div>
        <div class="q-text" id="q-text">질문이 로드되지 않았습니다</div>
        <ul class="scale-list" id="scale-list"></ul>
        <div class="quiz-btns">
          <button class="btn-q btn-prev" id="btn-prev" onclick="prevQ()" style="display:none">← 이전</button>
          <button class="btn-q btn-next" id="btn-next" onclick="nextQ()">다음 →</button>
        </div>
      </div>
    </div>
  </div></div>
</div>

<!-- SCREEN: 결과 -->
<div id="screen-result" class="screen">
  <div class="container"><div class="sec">
    <div class="card">
      <div class="result-header">
        <div class="result-icon" id="result-icon">✨</div>
        <div class="result-type" id="result-type">유형명</div>
        <div class="result-keywords" id="result-keywords"></div>
      </div>
      <div class="result-content">
        <!-- 완료 현황 -->
        <div id="family-status-box" style="background:#F8F7F3;border:1px solid var(--border);
          border-radius:10px;padding:16px 18px;margin:16px 0;font-size:.84rem">
          <div style="font-weight:700;color:var(--navy);margin-bottom:8px">👨‍👩‍👧 가족 검사 현황</div>
          <div id="family-status-list">확인 중...</div>
        </div>

        <!-- 리포트 링크 (완료된 사람 있으면 바로 표시) -->
        <div id="report-link-box" style="display:none;background:#F0F7F4;border:1.5px solid rgba(37,96,96,.28);
          border-radius:10px;padding:16px 18px;margin:12px 0">
          <div style="font-size:.74rem;font-weight:800;letter-spacing:.04em;margin-bottom:10px;color:var(--teal)"
            id="report-box-label">📊 가족 리포트</div>
          <a id="report-link-btn" href="#" target="_blank"
            style="display:block;width:100%;padding:13px;background:var(--teal);color:#fff;
              border-radius:8px;text-align:center;font-weight:800;font-size:.9rem;text-decoration:none;
              margin-bottom:8px">
            가족 리포트 보기 →
          </a>
          <div style="font-size:.75rem;color:var(--light);text-align:center" id="report-incomplete-note"></div>
        </div>

        <div class="result-actions" style="display:flex;flex-direction:column;gap:8px;margin-top:16px">
          <button class="btn-p" id="btn-check-report" onclick="checkAllComplete()">현황 새로고침</button>
          <a id="btn-goto-dash" href="parenting-dashboard.html"
            style="display:block;width:100%;padding:13px;background:var(--bg);color:var(--navy);
              border:1.5px solid var(--border);border-radius:10px;text-align:center;
              font-weight:700;font-size:.9rem;text-decoration:none;box-sizing:border-box">
            📊 관리자 대시보드 →
          </a>
        </div>
      </div>
    </div>
  </div></div>
</div>

<footer>
  온유스쿨 · <a href="https://onyuschool.com" style="color:var(--navy);text-decoration:none">onyuschool.com</a>
</footer>

let cur = 0;
const ans = Array(28).fill(null);
let surveyToken = null;
let memberData = null;
let sessionCode = null;
let currentQuestions = QUESTIONS;
let isChildABMode = false;

// ════════════════════════════════════════════════════════════════
// 초기화
// ════════════════════════════════════════════════════════════════
async function init() {
  const params = new URLSearchParams(location.search);
  surveyToken = params.get('token');

  if (!surveyToken) {
    showError('유효하지 않은 링크입니다');
    return;
  }

  try {
    // Supabase에서 member 조회
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/family_members?survey_token=eq.${surveyToken}`,
      {
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
        }
      }
    );

    if (!res.ok) {
      throw new Error('Failed to fetch member data');
    }

    const data = await res.json();
    if (!data || data.length === 0) {
      showError('회원 정보를 찾을 수 없습니다');
      return;
    }

    memberData = data[0];
    sessionCode = memberData.session_code;

    // UI 설정
    document.getElementById('user-name').textContent = memberData.name;
    document.getElementById('intro-name').textContent = memberData.name;
    const roleText = memberData.role === 'father' ? '아버지' :
                     memberData.role === 'mother' ? '어머니' :
                     memberData.role.startsWith('child_') ? '자녀' : '검사자';
    document.getElementById('user-role').textContent = roleText + '님의';

    // intro 화면으로 전환
    showScreen('intro');

  } catch (error) {
    console.error('Error:', error);
    showError('데이터를 불러오는 중 오류가 발생했습니다');
  }
}

// ════════════════════════════════════════════════════════════════
// 화면 전환
// ════════════════════════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showError(msg) {
  document.getElementById('error-message').textContent = msg;
  showScreen('error');
}

    div.innerHTML = `
      <div class="type-card-icon">${info.icon}</div>
      <div class="type-card-name">${info.kr}</div>
      <div class="type-card-keywords">${info.keywords.join(', ')}</div>
    `;
    grid.appendChild(div);
  });
}

function selectType(type) {
  selectedType = type;
  document.querySelectorAll('.type-card').forEach(c => c.classList.remove('selected'));
  event.target.closest('.type-card').classList.add('selected');
  document.getElementById('btn-select-type').disabled = false;
}

function startTypeSelect() {
  document.getElementById('intro-buttons').style.display = 'none';
  document.getElementById('type-select-wrap').style.display = 'block';
  renderTypeGrid();
}

function startSurvey() {
  // 모두 A/B 모드 사용, 자녀는 쉬운 문항으로 분기
  isChildABMode = true;
  if (memberData.member_type === 'child') {
    const age = new Date().getFullYear() - (memberData.birth_year || 0);
    currentQuestions = age >= 13 ? CHILD_Q_TEEN : CHILD_Q_ELEM;
  } else {
    // 성인(부모)도 A/B 방식
    currentQuestions = ADULT_Q_AB;
  }

  cur = 0;
  ans.fill(null);
  showScreen('survey');
  renderQ();
}

// ════════════════════════════════════════════════════════════════
// 유형 직접 선택 제출
// ════════════════════════════════════════════════════════════════
async function selectTypeSubmit() {
  if (!selectedType) return;

  try {
    const updateRes = await fetch(
      `${SUPABASE_URL}/rest/v1/family_members?survey_token=eq.${surveyToken}`,
      {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
        },
        body: JSON.stringify({
          sg_type: selectedType,
          completed_at: new Date().toISOString()
        })
      }
    );

    if (!updateRes.ok) {
      throw new Error('Failed to submit type selection');
    }

    // 결과 화면 표시
    showResult(selectedType, {});

  } catch (error) {
    console.error('Error:', error);
    showError('유형 등록 중 오류가 발생했습니다');
  }
}

// ════════════════════════════════════════════════════════════════
// 검사 렌더링 (5점 척도 또는 A/B)
// ════════════════════════════════════════════════════════════════
function renderQ() {
  const q = currentQuestions[cur];

  document.getElementById('q-num').textContent = cur + 1;
  document.getElementById('q-badge').textContent = 'Q' + (cur + 1) + ' · ' + (DIM_LABEL[q.dim] || q.dim);
  document.getElementById('q-text').textContent = isChildABMode ? '' : q.text;
  document.getElementById('prog-fill').style.width = ((cur + 1) / 28 * 100).toFixed(1) + '%';

  const list = document.getElementById('scale-list');
  list.innerHTML = '';

  if (isChildABMode) {
    // A/B 카드 렌더링
    const abWrap = document.createElement('div');
    abWrap.className = 'ab-wrap';

    ['a', 'b'].forEach(option => {
      const card = document.createElement('div');
      card.className = 'ab-card' + (ans[cur] === (option === 'a' ? 1 : 5) ? ' selected' : '');
      card.onclick = () => { ans[cur] = option === 'a' ? 1 : 5; renderQ(); };
      card.innerHTML = `
        <div class="ab-card-label">${option.toUpperCase()}</div>
        <div class="ab-card-text">${q[option]}</div>
      `;
      abWrap.appendChild(card);
    });

    list.appendChild(abWrap);
  } else {
    // 5점 척도 렌더링
    SCALE_TEXT.forEach((txt, i) => {
      const v = i + 1;
      const li = document.createElement('li');
      li.className = 'scale-item';
      const id = 'opt_' + cur + '_' + v;
      const checked = ans[cur] === v ? 'checked' : '';
      li.innerHTML = `
        <input type="radio" id="${id}" name="scale" value="${v}" ${checked}
          onchange="ans[${cur}]=${v};updateBtnState()">
        <div class="scale-radio"></div>
        <label class="scale-text" for="${id}">${txt}</label>
      `;
      list.appendChild(li);
    });
  }

  updateBtnState();
}

function updateBtnState() {
  const prevBtn = document.getElementById('btn-prev');
  const nextBtn = document.getElementById('btn-next');

  prevBtn.style.display = cur > 0 ? 'block' : 'none';
  nextBtn.disabled = ans[cur] === null;
}

function prevQ() {
  if (cur > 0) {
    cur--;
    renderQ();
  }
}

function nextQ() {
  if (ans[cur] === null) return;

  if (cur < 27) {
    cur++;
    renderQ();
  } else {
    // 완료
    submitSurvey();
  }
}

// ════════════════════════════════════════════════════════════════
// 결과 계산
// ════════════════════════════════════════════════════════════════
function calcType() {
  const scores = {};
  'Ne Ni Si Se Fe Fi Ti Te'.split(' ').forEach(d => scores[d] = 0);

  currentQuestions.forEach((q, idx) => {
    const val = ans[idx] || 0;
    scores[q.dim] += val;
  });

  return scores;
}

// ════════════════════════════════════════════════════════════════
// 제출
// ════════════════════════════════════════════════════════════════
async function submitSurvey() {
  try {
    const dimScores = calcType();
    const sgType = determineSgType(dimScores);

    // UPDATE family_members
    const updateRes = await fetch(
      `${SUPABASE_URL}/rest/v1/family_members?survey_token=eq.${surveyToken}`,
      {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
        },
        body: JSON.stringify({
          sg_type: sgType,
          dim_scores: dimScores,
          answers: ans,
          completed_at: new Date().toISOString()
        })
      }
    );

    if (!updateRes.ok) {
      throw new Error('Failed to submit survey');
    }

    // 결과 화면 표시
    showResult(sgType, dimScores);

  } catch (error) {
    console.error('Error:', error);
    showError('검사 결과를 저장하는 중 오류가 발생했습니다');
  }
}

function determineSgType(scores) {
  // 간단한 로직: 각 유형별로 그룹화
  const group1 = (scores.Ne || 0) + (scores.Ni || 0);
  const group2 = (scores.Si || 0) + (scores.Se || 0);
  const group3 = (scores.Fe || 0) + (scores.Fi || 0);
  const group4 = (scores.Ti || 0) + (scores.Te || 0);

  let type = 'SPARK';
  const combos = [
    { dims: ['Ne', 'Fe'], type: 'SPARK' },
    { dims: ['Ni', 'Fe'], type: 'VISION' },
    { dims: ['Si', 'Fe'], type: 'STEADY' },
    { dims: ['Se', 'Fe'], type: 'PLAYER' },
    { dims: ['Fe', 'Fi'], type: 'HARMONY' },
    { dims: ['Fi', 'Ne'], type: 'SOUL' },
    { dims: ['Ti', 'Ni'], type: 'LOGIC' },
    { dims: ['Te', 'Ne'], type: 'LEADER' },
  ];

  let maxScore = 0;
  combos.forEach(c => {
    const s = (scores[c.dims[0]] || 0) + (scores[c.dims[1]] || 0);
    if (s > maxScore) {
      maxScore = s;
      type = c.type;
    }
  });

  return type;
}

// ════════════════════════════════════════════════════════════════
// 결과 표시
// ════════════════════════════════════════════════════════════════
function showResult(sgType, scores) {
  const typeInfo = TYPE_DATA[sgType] || TYPE_DATA.SPARK;

  document.getElementById('result-icon').textContent = typeInfo.icon;
  document.getElementById('result-type').textContent = typeInfo.kr;

  const kws = document.getElementById('result-keywords');
  kws.innerHTML = typeInfo.keywords.map(kw => `<div class="kw">${kw}</div>`).join('');

  showScreen('result');

  // 모든 완료 여부 체크
  checkAllComplete();
}

// ════════════════════════════════════════════════════════════════
// 가족 현황 체크 + 리포트 링크 표시
// ════════════════════════════════════════════════════════════════
async function checkAllComplete() {
  if (!sessionCode) return;

  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/family_members?session_code=eq.${sessionCode}&select=name,role,sg_type,completed_at&order=created_at.asc`,
      { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` } }
    );
    if (!res.ok) throw new Error('조회 실패');

    const members = await res.json();
    const done    = members.filter(m => m.completed_at && m.sg_type);
    const waiting = members.filter(m => !m.completed_at || !m.sg_type);
    const allDone = waiting.length === 0;

    // 현황 목록 렌더링
    const TYPE_KR = {SPARK:'스파크',VISION:'비전',STEADY:'스테디',PLAYER:'플레이어',
                     HARMONY:'하모니',SOUL:'소울',LOGIC:'로직',LEADER:'리더'};
    const TYPE_ICON = {SPARK:'✨',VISION:'🔭',STEADY:'🌿',PLAYER:'🎯',
                       HARMONY:'🕊️',SOUL:'🌊',LOGIC:'🔬',LEADER:'⚡'};
    const ROLE_KR = {father:'아버지',mother:'어머니',child_1:'자녀1',child_2:'자녀2',child_3:'자녀3',child_4:'자녀4'};

    document.getElementById('family-status-list').innerHTML = members.map(m => {
      const roleLbl = ROLE_KR[m.role] || m.role;
      if (m.completed_at && m.sg_type) {
        return `<div style="display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid #F0EDE6">
          <span style="color:var(--teal)">✅</span>
          <span style="font-weight:600">${m.name}</span>
          <span style="color:var(--light);font-size:.75rem">(${roleLbl})</span>
          <span style="margin-left:auto;font-size:.78rem;font-weight:700">${TYPE_ICON[m.sg_type]||''} ${TYPE_KR[m.sg_type]||m.sg_type}</span>
        </div>`;
      } else {
        return `<div style="display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid #F0EDE6">
          <span style="color:var(--light)">⏳</span>
          <span style="font-weight:600">${m.name}</span>
          <span style="color:var(--light);font-size:.75rem">(${roleLbl})</span>
          <span style="margin-left:auto;font-size:.75rem;color:var(--light)">대기 중</span>
        </div>`;
      }
    }).join('');

    // 완료자 1명 이상이면 리포트 링크 표시
    if (done.length > 0) {
      const reportUrl = `${window.location.origin}/parenting-report.html?session=${sessionCode}`;
      document.getElementById('report-link-box').style.display = 'block';
      document.getElementById('report-link-btn').href = reportUrl;

      if (allDone) {
        document.getElementById('report-box-label').textContent = '🎉 전원 완료! 가족 리포트 준비됨';
        document.getElementById('report-incomplete-note').textContent = '';
      } else {
        document.getElementById('report-box-label').textContent = `📊 가족 리포트 (${done.length}/${members.length}명 완료)`;
        document.getElementById('report-incomplete-note').textContent =
          `${waiting.map(m=>m.name).join(', ')}님이 아직 검사 중입니다. 지금도 리포트를 볼 수 있어요.`;
      }
    }

    // 완료 시 관리자에게 알림 (Apps Script 연동)
    notifyAdminOnComplete(members, done);

  } catch (e) {
    console.error('현황 체크 오류:', e.message);
  }
}

// ── 관리자 알림 (Apps Script → Google Sheets + 이메일) ──
async function notifyAdminOnComplete(members, done) {
  // Apps Script URL이 설정되어 있으면 전송
  const APPS_SCRIPT_URL = ''; // TODO: Apps Script 웹앱 URL 입력
  if (!APPS_SCRIPT_URL) return;

  // 방금 본인이 완료한 경우만 전송 (중복 방지)
  const me = members.find(m => m.name === memberData?.name);
  if (!me || !me.completed_at) return;

  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        type: 'supabase_webhook',
        source: 'parenting',
        record: me,
        session_summary: {
          session_code: sessionCode,
          total: members.length,
          done: done.length,
          all_complete: done.length === members.length,
        }
      })
    });
  } catch(e) { /* 알림 실패해도 검사 결과에 영향 없음 */ }
}

// 페이지 로드 시 초기화
init();
</script>
